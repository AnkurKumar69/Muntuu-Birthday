<!DOCTYPE html>
<html>
<head>
<title>For Muntuu Madam 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    padding:0;
    text-align:center;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#ee9ca7);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
font-family:'Great Vibes',cursive;
font-size:65px;
margin-top:30px;
text-shadow:0 0 20px white;
}

#slider{
width:320px;
height:360px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 40px rgba(255,255,255,0.8);
margin-top:15px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff1493;
}

#countdown{
font-size:26px;
margin-top:15px;
}

/* Hearts */
.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* Confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall 4s linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Fireworks */
.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}
@keyframes explode{
to{transform:scale(8);opacity:0}
}

/* Popup */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;left:0;
display:none;
z-index:999;
}
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#ff1493;
padding:30px;
border-radius:20px;
width:80%;
max-width:400px;
display:none;
z-index:1000;
}
</style>
</head>

<body>

<h1>Muntuu Madam 🎀</h1>
<h2>Happy Birthday Mitrr.. ❤️</h2>

<div id="countdown"></div>

<img id="slider" src="muntuu1.jpg">
<br>
<button onclick="startExperience()">💖 Start Surprise</button>

<audio id="bgmusic" src="music.mp3" loop></audio>

<div class="overlay" id="overlay"></div>
<div class="popup" id="lovePopup">
<h2>For You 💕</h2>
<p>
Dear Muntuu,<br><br>
Tum meri life ka sabse beautiful hissa ho.  
Aaj ka din sirf tumhare naam ❤️  
Forever yours ✨
</p>
<button onclick="closePopup()">Close 💖</button>
</div>

<script>

/* 🎵 START EXPERIENCE */
function startExperience(){
let music=document.getElementById("bgmusic");
music.volume=0;
music.play();

let fade=setInterval(()=>{
if(music.volume<1){
music.volume+=0.05;
}else{
clearInterval(fade);
}
},200);
}

/* 📸 Slideshow */
let images=["muntuu1.jpg","muntuu3.jpg"];
let i=0;
setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slider").src=images[i];
},3000);

/* 🎂 SET BIRTHDAY */
let birthday=new Date(2005,3,20);

let countdown=setInterval(()=>{
let now=new Date().getTime();
let dist=birthday-now;

if(dist<=0){
clearInterval(countdown);
document.getElementById("countdown").innerHTML="🎉 IT'S HER DAY ❤️";
startFireworks();
startConfetti();
showPopup();
return;
}

let d=Math.floor(dist/(1000*60*60*24));
let h=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((dist%(1000*60*60))/(1000*60));
let s=Math.floor((dist%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s ";
},1000);

/* 💖 Hearts */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},500);

/* 🎆 Fireworks */
function startFireworks(){
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
f.style.background="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
},300);
}

/* 🎉 Confetti */
function startConfetti(){
setInterval(()=>{
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},200);
}

/* 💌 Popup */
function showPopup(){
document.getElementById("overlay").style.display="block";
document.getElementById("lovePopup").style.display="block";
}
function closePopup(){
document.getElementById("overlay").style.display="none";
document.getElementById("lovePopup").style.display="none";
}

/* 😏 SECRET 5 TAP */
let tap=0;
document.addEventListener("click",()=>{
tap++;
if(tap===5){
alert("💖 You found the secret! Forever together ❤️");
tap=0;
}
});

</script>

</body>
</html>
