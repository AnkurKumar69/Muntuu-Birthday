<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Muntuu QT🎀 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
        }

        #slider {
            width: 260px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 0 25px white;
        }

        p {
            font-size: 20px;
            width: 70%;
            margin: auto;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #ff758c;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: pink;
        }
    </style>
</head>

<body>

<h1>Happy Birthday Muntuu Madam🎀 ❤️</h1>

<img id="slider" src="muntuu1.jpg">

<p>
    Dear Muntuu🎀 💖 <br><br>
    Tum meri life ki sabse beautiful smile ho ✨  
    Tumhari hasi meri favourite sound hai 🎶  
    Har din tumhare saath special lagta hai…  
    Aaj ka din sirf tumhare liye hai ❤️  
</p>

<button onclick="playMusic()">🎵 Play Our Song 💖</button>

<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let images = ["muntuu1.jpg", "muntuu3.jpg"];
let i = 0;

setInterval(function(){
    i++;
    if(i >= images.length){
        i = 0;
    }
    document.getElementById("slider").src = images[i];
}, 3000);

function playMusic(){
    document.getElementById("bgmusic").play();
}
</script>

</body>
</html>
